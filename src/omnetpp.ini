[General]
sim-time-limit = 500s
# 1. Point to your specific network
network = src.SwarmNetwork

# --- The NED system uses dots for packages ---
*.mainNode.numApps = 1
*.mainNode.app[0].typename = "src.MainNodeApp"
**.mainNode.app[0].destAddr = "drone[0]"

*.mbs[*].numApps = 1
*.mbs[*].app[0].typename = "src.MbsApp"

*.drone[*].numApps = 1
*.drone[*].app[0].typename = "src.DroneApp"

# This forces the simulator to load your project's compiled library
#load-libs = ../src/UavSwarmTA
#load-libs = ../out/clang-debug/src/UavSwarmTA
# --------------------------------------

**.at.typename = "MessageDispatcher"
**.at.forwardProtocol = "udp"

# 2. Reproducibility & Batch Runs
# Ini files allow the user to define various scenarios iterating over a list of values 
# for certain NED parameters, and/or do multiple runs with different seeds[cite: 530].
repeat = 5 #repeat simulation 5 times
seed-set = ${repetition} #generate new seed for each sim iteration

# Set the task limit for the Main Node
*.mainNode.app[0].taskLimit = 500

# Optional safety net: Stops the simulation if it runs for 100,000 simulated seconds
sim-time-limit = 100000s


**.commTimeoutDuration = 10s
**.taskGenerationInterval = 5s
**.taskLimit = 50
**.destPort = 1000
**.localPort = 1000
**.drone_comm_range = 250m


*.mainNode.app[0].algorithmType = "FIFO"
*.mainNode.app[0].taskGenerationInterval = uniform(0.5s, 2s) # High stress!
*.mainNode.app[0].bumpDroppedPriority = true


# 3. Physical Map Boundaries (2000m x 2000m)
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 2000m
**.constraintAreaMaxY = 2000m
**.constraintAreaMaxZ = 100m

# 4. Swarm Population Sizes
*.numMbs = 3
*.numDrones = 10

# 5. Mobility (Instant Acceleration, Constant Speed)
# Main node stays completely still
*.mainNode.mobility.typename = "StationaryMobility"

# Mobile Base Stations (MBS)
*.mbs[*].mobility.typename = "StationaryMobility" #usign waypoint to visualize real time movement in GUI
*.mbs[*].mobility.initialZ = 0m # Ground level
*.mbs[*].mobility.speed = 15mps

# Drones
*.drone[*].mobility.typename = "StationaryMobility"
*.drone[*].mobility.speed = 25mps
*.drone[*].mobility.initialZ = 50m # Flying altitude


# 6. Communication Ranges (Unit Disk / Ideal Radio)
# Use the fully qualified INET 4 paths!
**.radio.typename = "inet.physicallayer.wireless.unitdisk.UnitDiskRadio"
**.radioMedium.typename = "inet.physicallayer.wireless.unitdisk.UnitDiskRadioMedium"

# Your specific transmission ranges
*.mainNode.wlan[0].radio.transmitter.communicationRange = 1500m
*.mbs[*].wlan[0].radio.transmitter.communicationRange = 800m
*.drone[*].wlan[0].radio.transmitter.communicationRange = 250m

# --- Network Bitrate Settings ---
**.wlan[*].bitrate = 54Mbps
**.wlan[*].mac.bitrate = 54Mbps
**.wlan[*].radio.transmitter.bitrate = 54Mbps
